<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ishodovanja - GO4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'General Sans', sans-serif;
            background: #fafbfc;
            color: #4a5568;
            font-size: 16px;
        }
        
        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 32px 24px;
            overflow-y: auto;
            z-index: 1000;
            transition: width 0.3s ease, margin-left 0.3s ease;
        }
        
        .sidebar.collapsed {
            width: 70px;
            padding: 24px 12px;
        }
        
        .sidebar-toggle {
            position: absolute;
            top: 32px;
            right: -40px;
            width: 32px;
            height: 32px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d3748;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .sidebar-toggle:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
        }
        
        .sidebar.collapsed .sidebar-toggle {
            right: -40px;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
            text-decoration: none;
            color: inherit;
        }
        
        .sidebar-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #d4a853 0%, #c99a3f 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 75% 50%, 100% 75%, 25% 100%, 0% 75%, 25% 50%);
            flex-shrink: 0;
        }
        
        .sidebar-logo-text {
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .sidebar-logo-text {
            opacity: 0;
            display: none;
        }
        
        .nav-item span:last-child {
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .nav-item span:last-child {
            opacity: 0;
            display: none;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #718096;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: #f7fafc;
            color: #2d3748;
        }
        
        .nav-item.active {
            background: #fef5e7;
            color: #d4a853;
        }
        
        .nav-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        
        /* MAIN CONTENT */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }
        
        .main-content.sidebar-collapsed {
            margin-left: 70px;
        }
        
        /* TOP BAR */
        .top-bar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-bar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .top-bar-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }
        
        .top-bar-menu {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #2d3748;
        }
        
        /* CONTENT */
        .content {
            flex: 1;
            padding: 48px 40px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* HEADER */
        .page-header {
            margin-bottom: 48px;
        }
        
        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .project-info {
            display: flex;
            gap: 32px;
            margin-top: 16px;
            font-size: 14px;
            color: #718096;
        }
        
        .info-item {
            display: flex;
            gap: 8px;
        }
        
        .info-label {
            font-weight: 600;
            color: #4a5568;
        }
        
        /* TIMELINE */
        .timeline {
            position: relative;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 24px;
            top: 60px;
            bottom: 0;
            width: 1px;
            background: #e2e8f0;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 48px;
            padding-left: 70px;
        }
        
        .timeline-number {
            position: absolute;
            left: 0;
            top: 0;
            width: 48px;
            height: 48px;
            background: #edf2f7;
            color: #2d3748;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            border: 1px solid #e2e8f0;
        }
        
        .timeline-item.active .timeline-number {
            background: #d4a853;
            color: #ffffff;
            border-color: #d4a853;
        }
        
        .timeline-item.completed .timeline-number {
            background: #10b981;
            color: #ffffff;
            border-color: #10b981;
        }
        
        .timeline-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 28px;
            transition: all 0.2s;
        }
        
        .timeline-item:hover .timeline-content {
            border-color: #cbd5e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .timeline-item.disabled .timeline-content {
            background: #f7fafc;
            opacity: 0.6;
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .timeline-title {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 6px;
        }
        
        .timeline-description {
            font-size: 13px;
            color: #718096;
            line-height: 1.5;
        }
        
        .timeline-status {
            font-size: 11px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 10px;
            background: #edf2f7;
            color: #718096;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .timeline-item.active .timeline-status {
            background: #fef5e7;
            color: #c99a3f;
        }
        
        .timeline-item.completed .timeline-status {
            background: #d1fae5;
            color: #065f46;
        }
        
        .timeline-item.disabled .timeline-status {
            background: #edf2f7;
            color: #a0aec0;
        }
        
        /* PHASE ACTIONS */
        .phase-actions {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffffff;
            color: #2d3748;
        }
        
        .btn:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }
        
        .btn-primary {
            background: #085158;
            color: white;
            border-color: #085158;
        }
        
        .btn-primary:hover {
            background: #d4a853;
            border-color: #d4a853;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn:disabled, .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* FOOTER */
        footer {
            padding: 32px 40px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
            margin-top: auto;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .sidebar.hidden {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .top-bar-menu {
                display: block;
            }
            
            .content {
                padding: 32px 20px;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .project-info {
                flex-direction: column;
                gap: 12px;
            }
            
            .timeline-item {
                padding-left: 60px;
                margin-bottom: 40px;
            }
            
            .timeline-number {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
            
            .timeline::before {
                left: 22px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" title="Sklopi/Otvori">◀</button>
    <a href="/" class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <div class="sidebar-logo-text">GO4<br>Portal</div>
    </a>
    
    <nav class="sidebar-nav">
        <a href="/" class="nav-item">
            <span class="nav-icon">■</span>
            <span>Dashboard</span>
        </a>
        <a href="/kupci" class="nav-item">
            <span class="nav-icon">◎</span>
            <span>Kupci</span>
        </a>
        <a href="/doc-portal-1/" class="nav-item active">
            <span class="nav-icon">▢</span>
            <span>Dokumenti</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">⚙</span>
            <span>Postavke</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">?</span>
            <span>Pomoć</span>
        </a>
    </nav>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="top-bar-title">Portal Ishodovanja</div>
            <button class="top-bar-menu" id="menuBtn">☰</button>
        </div>
    </div>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title" id="projectTitle">Projekat</h1>
            <div class="project-info" id="projectInfo">
                <!-- Dinamički sadržaj -->
            </div>
        </div>

        <div class="timeline" id="timeline">
            <!-- Dinamički sadržaj faza -->
        </div>
    </div>

    <footer>
        <p>GO4 - Dokumentacioni Portal © 2024 | Powered by GO4ENERGY</p>
    </footer>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const mainContent = document.querySelector('.main-content');
    const projectTitle = document.getElementById('projectTitle');
    const projectInfo = document.getElementById('projectInfo');
    const timeline = document.getElementById('timeline');

    // Učitaj stanje sidebar-a iz localStorage
    function initSidebar() {
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isCollapsed) {
            sidebar.classList.add('collapsed');
            mainContent.classList.add('sidebar-collapsed');
            sidebarToggle.textContent = '▶';
        }
    }

    // Toggle sidebar
    sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('sidebar-collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
        sidebarToggle.textContent = isCollapsed ? '▶' : '◀';
    });

    // Uzmi projectId iz URL-a
    function getProjectId() {
        const path = window.location.pathname;
        // Očekujemo /doc-portal-1/portal/PROJECT_ID
        const parts = path.split('/');
        const portalIndex = parts.indexOf('portal');
        if (portalIndex !== -1 && parts[portalIndex + 1]) {
            return parts[portalIndex + 1];
        }
        return null;
    }

    // Učitaj projekat
    function loadProject() {
        const projectId = getProjectId();
        if (!projectId) {
            window.location.href = '/doc-portal-1/';
            return;
        }

        const projects = JSON.parse(localStorage.getItem('projects_10_8kw') || '[]');
        const project = projects.find(p => p.id === projectId);

        if (!project) {
            window.location.href = '/doc-portal-1/';
            return;
        }

        // Prikaži informacije o projektu
        projectTitle.textContent = project.naziv;
        projectInfo.innerHTML = `
            <div class="info-item">
                <span class="info-label">Kupac:</span>
                <span>${project.kupac.ime} ${project.kupac.prezime}</span>
            </div>
            <div class="info-item">
                <span class="info-label">PIB:</span>
                <span>${project.kupac.pib}</span>
            </div>
            <div class="info-item">
                <span class="info-label">Snaga:</span>
                <span>${project.kw} kW</span>
            </div>
            <div class="info-item">
                <span class="info-label">Lokacija:</span>
                <span>${project.lokacija}</span>
            </div>
        `;

        // Kreiraj timeline
        renderPhases(projectId);
    }

    // Renderuj faze
    function renderPhases(projectId) {
        const phases = [
            {
                id: 0,
                title: 'Priprema Dokumentacije',
                description: 'Osnovne forme ovlašćenja i ugovore potребne za početak',
                docs: ['Forma ovlašćenja', 'Forma ugovora']
            },
            {
                id: 1,
                title: 'Izgradnja Proizvodnog Objekta',
                description: 'Dokumentacija o izgradnji i instalaciji solarnog sistema',
                docs: ['Potvrda o uslovima priklučenja', 'Dodaci o invertorima', 'Karakteristike sistema']
            },
            {
                id: 2,
                title: 'Prilagođenje Mernog Mjesta',
                description: 'Procedure za prilagođenje mjernog mjesta za proizvodnju',
                docs: ['Forma zahtjeva', 'Tehnička dokumentacija']
            },
            {
                id: 3,
                title: 'Zaključivanje Ugovora',
                description: 'Konačni ugovori sa elektrodistribucijom',
                docs: ['Forma zahtjeva za ugovor']
            },
            {
                id: 4,
                title: 'Upis u Registar',
                description: 'Konačna registracija kupca-proizvođača',
                docs: []
            }
        ];

        const projectPhases = JSON.parse(localStorage.getItem(`phases_${projectId}`) || '[]');

        timeline.innerHTML = phases.map(phase => {
            const phaseStatus = projectPhases.find(p => p.phaseId === phase.id) || {
                phaseId: phase.id,
                status: phase.id === 0 ? 'active' : 'pending',
                completed: false
            };

            const statusClass = phaseStatus.completed ? 'completed' : phaseStatus.status === 'active' ? 'active' : 'disabled';
            const statusText = phaseStatus.completed ? 'Završeno' : phaseStatus.status === 'active' ? 'U toku' : 'Čeka se';

            return `
                <div class="timeline-item ${statusClass}">
                    <div class="timeline-number">${phase.id}</div>
                    <div class="timeline-content">
                        <div class="timeline-header">
                            <div>
                                <h3 class="timeline-title">${phase.title}</h3>
                                <p class="timeline-description">${phase.description}</p>
                            </div>
                            <span class="timeline-status">${statusText}</span>
                        </div>
                        ${phase.docs.length > 0 ? `
                            <div style="margin-top: 12px; font-size: 13px; color: #718096;">
                                <strong>Potrebni dokumenti:</strong>
                                <ul style="margin: 8px 0 0 20px;">
                                    ${phase.docs.map(doc => `<li>${doc}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        <div class="phase-actions">
                            ${phaseStatus.status === 'active' || phaseStatus.status === 'completed' ? `
                                <button class="btn btn-primary" onclick="openPhase(${phase.id}, '${projectId}')">
                                    Otvori Fazu
                                </button>
                            ` : `
                                <button class="btn" disabled>Otvori Fazu</button>
                            `}
                            ${phaseStatus.status === 'active' && !phaseStatus.completed ? `
                                <button class="btn btn-success" onclick="completePhase(${phase.id}, '${projectId}')">
                                    Označi kao Gotovo
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Otvori fazu
    function openPhase(phaseId, projectId) {
        alert(`Otvaraj faza ${phaseId} za projekat ${projectId}`);
        // Ovdje će biti logika za otvaranje forme za tu fazu
    }

    // Označi fazu kao gotovu
    function completePhase(phaseId, projectId) {
        const projectPhases = JSON.parse(localStorage.getItem(`phases_${projectId}`) || '[]');
        const phaseIndex = projectPhases.findIndex(p => p.phaseId === phaseId);

        if (phaseIndex >= 0) {
            projectPhases[phaseIndex].completed = true;
            projectPhases[phaseIndex].completedAt = new Date().toISOString();
        } else {
            projectPhases.push({
                phaseId,
                status: 'active',
                completed: true,
                completedAt: new Date().toISOString()
            });
        }

        localStorage.setItem(`phases_${projectId}`, JSON.stringify(projectPhases));

        // Aktiviraj sljedeću fazu ako postoji
        if (phaseId < 4) {
            const nextPhase = projectPhases.find(p => p.phaseId === phaseId + 1);
            if (!nextPhase) {
                projectPhases.push({
                    phaseId: phaseId + 1,
                    status: 'active',
                    completed: false
                });
                localStorage.setItem(`phases_${projectId}`, JSON.stringify(projectPhases));
            }
        }

        renderPhases(projectId);
    }

    // Mobile menu
    menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.add('hidden');
            }
        });
    });

    // Učitaj projekat
    loadProject();
    
    // Inicijalizuj sidebar
    initSidebar();
</script>

</body>
</html>
