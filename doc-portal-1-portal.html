<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ishodovanja - GO4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'General Sans', sans-serif;
            background: #fafbfc;
            color: #4a5568;
            font-size: 16px;
        }
        
        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 32px 24px;
            overflow-y: auto;
            z-index: 1000;
            transition: width 0.3s ease, margin-left 0.3s ease;
        }
        
        .sidebar.collapsed {
            width: 70px;
            padding: 24px 12px;
        }
        
        .sidebar-toggle {
            position: absolute;
            top: 32px;
            right: -40px;
            width: 32px;
            height: 32px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d3748;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .sidebar-toggle:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
        }
        
        .sidebar.collapsed .sidebar-toggle {
            right: -40px;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
            text-decoration: none;
            color: inherit;
        }
        
        .sidebar-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #d4a853 0%, #c99a3f 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 75% 50%, 100% 75%, 25% 100%, 0% 75%, 25% 50%);
            flex-shrink: 0;
        }
        
        .sidebar-logo-text {
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .sidebar-logo-text {
            opacity: 0;
            display: none;
        }
        
        .nav-item span:last-child {
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .nav-item span:last-child {
            opacity: 0;
            display: none;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #718096;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: #f7fafc;
            color: #2d3748;
        }
        
        .nav-item.active {
            background: #fef5e7;
            color: #d4a853;
        }
        
        .nav-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        
        /* MAIN CONTENT */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }
        
        .main-content.sidebar-collapsed {
            margin-left: 70px;
        }
        
        /* TOP BAR */
        .top-bar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-bar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .top-bar-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }
        
        .top-bar-menu {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #2d3748;
        }
        
        /* CONTENT */
        .content {
            flex: 1;
            padding: 48px 40px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* HEADER */
        .page-header {
            margin-bottom: 48px;
        }
        
        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .project-info {
            display: flex;
            gap: 32px;
            margin-top: 16px;
            font-size: 14px;
            color: #718096;
        }
        
        .info-item {
            display: flex;
            gap: 8px;
        }
        
        .info-label {
            font-weight: 600;
            color: #4a5568;
        }
        
        /* TIMELINE */
        .timeline {
            position: relative;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 24px;
            top: 60px;
            bottom: 0;
            width: 1px;
            background: #e2e8f0;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 48px;
            padding-left: 70px;
        }
        
        .timeline-number {
            position: absolute;
            left: 0;
            top: 0;
            width: 48px;
            height: 48px;
            background: #edf2f7;
            color: #2d3748;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            border: 1px solid #e2e8f0;
        }
        
        .timeline-item.active .timeline-number {
            background: #d4a853;
            color: #ffffff;
            border-color: #d4a853;
        }
        
        .timeline-item.completed .timeline-number {
            background: #10b981;
            color: #ffffff;
            border-color: #10b981;
        }
        
        .timeline-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 28px;
            transition: all 0.2s;
        }
        
        .timeline-item:hover .timeline-content {
            border-color: #cbd5e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .timeline-item.disabled .timeline-content {
            background: #f7fafc;
            opacity: 0.6;
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .timeline-title {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 6px;
        }
        
        .timeline-description {
            font-size: 13px;
            color: #718096;
            line-height: 1.5;
        }
        
        .timeline-status {
            font-size: 11px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 10px;
            background: #edf2f7;
            color: #718096;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .timeline-item.active .timeline-status {
            background: #fef5e7;
            color: #c99a3f;
        }
        
        .timeline-item.completed .timeline-status {
            background: #d1fae5;
            color: #065f46;
        }
        
        .timeline-item.disabled .timeline-status {
            background: #edf2f7;
            color: #a0aec0;
        }
        
        /* DOKUMENTACIJA */
        .docs-section {
            margin-top: 16px;
            font-size: 13px;
            color: #718096;
        }
        
        .docs-list {
            list-style: none;
            margin: 8px 0 0 0;
        }
        
        .doc-item {
            padding: 10px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #4a5568;
        }
        
        .doc-item:hover {
            border-color: #cbd5e0;
            background: #edf2f7;
        }
        
        .doc-item.form-link {
            cursor: pointer;
            background: #f0f7ff;
            border-color: #b3d9ff;
            color: #0369a1;
            font-weight: 500;
        }
        
        .doc-item.form-link:hover {
            background: #e0efff;
            border-color: #7db3e8;
        }
        
        .doc-item.upload-field {
            flex-direction: column;
            align-items: flex-start;
            padding: 12px;
        }
        
        .doc-item.uploaded {
            background: #f0fdf4 !important;
            border-color: #bbf7d0 !important;
            color: #15803d;
        }
        
        .doc-num {
            font-weight: 600;
            color: #2d3748;
            min-width: 30px;
            font-size: 12px;
        }
        
        .doc-text {
            flex: 1;
            font-size: 13px;
        }
        
        .file-input-wrapper {
            width: 100%;
            margin-top: 8px;
        }
        
        .file-input-wrapper input[type="file"] {
            font-size: 12px;
            padding: 6px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            color: #718096;
            background: #ffffff;
        }
        
        .file-uploaded {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: 12px;
            color: #15803d;
            font-weight: 500;
        }
        
        .file-uploaded::before {
            content: '✓';
            font-weight: bold;
        }
        
        /* PHASE ACTIONS */
        .phase-actions {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffffff;
            color: #2d3748;
        }
        
        .btn:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }
        
        .btn-primary {
            background: #085158;
            color: white;
            border-color: #085158;
        }
        
        .btn-primary:hover {
            background: #d4a853;
            border-color: #d4a853;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn:disabled, .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* FOOTER */
        footer {
            padding: 32px 40px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
            margin-top: auto;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .sidebar.hidden {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .top-bar-menu {
                display: block;
            }
            
            .content {
                padding: 32px 20px;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .project-info {
                flex-direction: column;
                gap: 12px;
            }
            
            .timeline-item {
                padding-left: 60px;
                margin-bottom: 40px;
            }
            
            .timeline-number {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
            
            .timeline::before {
                left: 22px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" title="Sklopi/Otvori">◀</button>
    <a href="/" class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <div class="sidebar-logo-text">GO4<br>Portal</div>
    </a>
    
    <nav class="sidebar-nav">
        <a href="/" class="nav-item">
            <span class="nav-icon">■</span>
            <span>Dashboard</span>
        </a>
        <a href="/kupci" class="nav-item">
            <span class="nav-icon">◎</span>
            <span>Kupci</span>
        </a>
        <a href="/doc-portal-1/" class="nav-item active">
            <span class="nav-icon">▢</span>
            <span>Dokumenti</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">⚙</span>
            <span>Postavke</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">?</span>
            <span>Pomoć</span>
        </a>
    </nav>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="top-bar-title">Portal Ishodovanja</div>
            <button class="top-bar-menu" id="menuBtn">☰</button>
        </div>
    </div>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title" id="projectTitle">Projekat</h1>
            <div class="project-info" id="projectInfo">
                <!-- Dinamički sadržaj -->
            </div>
        </div>

        <div class="timeline" id="timeline">
            <!-- Dinamički sadržaj faza -->
        </div>
    </div>

    <footer>
        <p>GO4 - Dokumentacioni Portal © 2024 | Powered by GO4ENERGY</p>
    </footer>
</div>

<!-- Load PDF Helper Functions -->
<script src="/pdf-helper.js"></script>

<script>
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const mainContent = document.querySelector('.main-content');
    const projectTitle = document.getElementById('projectTitle');
    const projectInfo = document.getElementById('projectInfo');
    const timeline = document.getElementById('timeline');

    // Učitaj stanje sidebar-a iz localStorage
    function initSidebar() {
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isCollapsed) {
            sidebar.classList.add('collapsed');
            mainContent.classList.add('sidebar-collapsed');
            sidebarToggle.textContent = '▶';
        }
    }

    // Toggle sidebar
    sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('sidebar-collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
        sidebarToggle.textContent = isCollapsed ? '▶' : '◀';
    });

    // Uzmi projectId iz URL-a
    function getProjectId() {
        const path = window.location.pathname;
        const parts = path.split('/');
        const portalIndex = parts.indexOf('portal');
        if (portalIndex !== -1 && parts[portalIndex + 1]) {
            return parts[portalIndex + 1];
        }
        return null;
    }

    // Učitaj projekat sa API-ja
    async function loadProject() {
        try {
            const projectId = getProjectId();
            if (!projectId) {
                window.location.href = '/doc-portal-1/';
                return;
            }

            // Učitaj projekat sa API-ja
            const response = await fetch(`/api/projekti/${projectId}`);
            
            if (!response.ok) {
                if (response.status === 404) {
                    alert('Projekat nije pronađen');
                    window.location.href = '/doc-portal-1/';
                    return;
                }
                throw new Error(`API error: ${response.status}`);
            }
            
            const project = await response.json();

            // Prikaži informacije o projektu
            projectTitle.textContent = project.naziv;
            projectInfo.innerHTML = `
                <div class="info-item">
                    <span class="info-label">Kupac:</span>
                    <span>${project.kupac.naziv}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">PIB/JMBG:</span>
                    <span>${project.kupac.pib || project.kupac.jmbg || '-'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Snaga:</span>
                    <span>${project.snaga} kW</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Lokacija:</span>
                    <span>${project.lokacija}</span>
                </div>
            `;

            // Kreiraj timeline sa fazama iz API-ja
            renderPhases(projectId, project.faze);
        } catch (error) {
            console.error('Error loading project:', error);
            alert('Greška pri učitavanju projekta: ' + error.message);
            window.location.href = '/doc-portal-1/';
        }
    }

    // Predefinisane faze sa dokumentima (iste za sve projekte)
    const PHASE_DEFINITIONS = [
        {
            id: 0,
            title: 'Priprema Dokumentacije',
            description: 'Osnovne forme ovlašćenja i ugovore potrebne za početak',
            docs: [
                { num: '0.1', text: 'Forma ovlašćenja', type: 'form', file: 'forma-ovlascenja.html' },
                { num: '0.2', text: 'Forma ugovora', type: 'form', file: 'forma-ugovor.html' }
            ]
        },
        {
            id: 1,
            title: 'Izgradnja Proizvodnog Objekta',
            description: 'Dokumentacija o izgradnji i instalaciji solarnog sistema',
            docs: [
                { num: '5.0', text: 'Potvrda o usklađenosti instalacija kupca-proizvodjača sa uslovima priklučenja', type: 'form', file: 'forma-potvrda.html' },
                { num: '5.1', text: 'Dodatak potvrdi sa podacima o invertorimima', type: 'form', file: 'forma-potvrda.html' },
                { num: '5.2', text: 'Dodatak potvrdi o karakteristikama, podešenju i funkcionalnom ispitivanju zaštitnih uređaja', type: 'form', file: 'forma-potvrda.html' },
                { num: '5.3', text: 'Licenca odgovornog izvođača radova', type: 'upload', id: 'doc-5-3' },
                { num: '5.4', text: 'Izveštaj o ispitivanju ispravnosti zaštitnog provodnika, glavnog i dodatnog provodnika sa izjednačavanjem potencijala', type: 'upload', id: 'doc-5-4' },
                { num: '5.5', text: 'Izveštaj o izvršenom ispitivanju otpornosti izolacije električne instalacije', type: 'upload', id: 'doc-5-5' },
                { num: '5.6', text: 'Izveštaj o izvršenom ispitivanju impedanse zaštitnog uzemljenja', type: 'upload', id: 'doc-5-6' },
                { num: '5.7', text: 'Izveštaj o izvršenom ispitivanju funkcionalnosti zaštitnih i upravljačkih uređaja', type: 'upload', id: 'doc-5-7' },
                { num: '5.8', text: 'Izjava o usaglašenosti proizvodnog objekta sa Mrežnim pravilima', type: 'upload', id: 'doc-5-8' },
                { num: '5.9', text: 'Jednopolna šema proizvodnog objekta do mernog mesta, overena od strane odgovornog Izvođača radova', type: 'upload', id: 'doc-5-9' },
                { num: '5.10', text: 'Tropolna šema proizvodnog objekta do mernog mesta sa urtanim zaštitnim provodnikom, overena od strane odgovornog Izvođača radova', type: 'upload', id: 'doc-5-10' },
                { num: '5.11', text: 'Sertifikate o usaglašenosti ugrađenog tipa invertora sa standardom SRPS EN 50549-1:2020', type: 'upload', id: 'doc-5-11' },
                { num: '5.12', text: 'Sertifikate o usaglašenosti, po relevantnim standardima za spojni prekidač, ukoliko nije deo invertora', type: 'upload', id: 'doc-5-12' },
                { num: '5.13', text: 'Sertifikate o usaglašenosti, po relevantnim standardima za zaštitni uređaj sistemske zaštite, ukoliko nije deo invertora', type: 'upload', id: 'doc-5-13' },
                { num: '5.14', text: 'Kataloške podatke za invertor, spojni prekidač (ukoliko nije deo invertora), zaštitni uređaj sistemske zaštite (ukoliko nije deo invertora)', type: 'upload', id: 'doc-5-14' }
            ]
        },
        {
            id: 2,
            title: 'Prilagođenje Mernog Mjesta',
            description: 'Procedure za prilagođenje mjernog mjesta za proizvodnju',
            docs: [
                { num: '6.1', text: 'Zahtev za prilagođenje mernog mesta', type: 'form', file: 'forma-zahtev.html' },
                { num: '6.2', text: 'Dokaz o uplati potrebnih troškova', type: 'upload', id: 'doc-6-2' },
                { num: '6.3', text: 'Atesti za ugrađenu opremu i uređaje', type: 'upload', id: 'doc-6-3' }
            ]
        },
        {
            id: 3,
            title: 'Zaključivanje Ugovora',
            description: 'Konačni ugovori sa elektrodistribucijom',
            docs: [
                { num: '7.1', text: 'Zahtev za zaključenje ugovora o potpunom snabdevanju sa neto obračunom', type: 'form', file: 'forma-zahtev-ugovora.html' }
            ]
        },
        {
            id: 4,
            title: 'Upis u Registar',
            description: 'Konačna registracija kupca-proizvođača',
            docs: []
        }
    ];

    // Renderuj faze - kombinuj API podatke sa predefinisanim fazama
    function renderPhases(projectId, apiFaze) {
        // Kombinuj API faze sa predefinisanim fazama i dokumentima
        const phases = PHASE_DEFINITIONS.map(phaseDef => {
            const apiPhase = apiFaze.find(f => f.fazaBroj === phaseDef.id) || {};
            return {
                ...phaseDef,
                apiId: apiPhase.id,
                status: apiPhase.status || (phaseDef.id === 0 ? 'active' : 'pending'),
                completed: apiPhase.completed || false
            };
        });

        timeline.innerHTML = phases.map(phase => {
            const statusClass = phase.completed ? 'completed' : phase.status === 'active' ? 'active' : 'disabled';
            const statusText = phase.completed ? 'Završeno' : phase.status === 'active' ? 'U toku' : 'Čeka se';

            return `
                <div class="timeline-item ${statusClass}">
                    <div class="timeline-number">${phase.id}</div>
                    <div class="timeline-content">
                        <div class="timeline-header">
                            <div>
                                <h3 class="timeline-title">${phase.title}</h3>
                                <p class="timeline-description">${phase.description}</p>
                            </div>
                            <span class="timeline-status">${statusText}</span>
                        </div>
                        ${phase.docs.length > 0 ? `
                            <div class="docs-section">
                                <strong>Potrebni dokumenti:</strong>
                                <ul class="docs-list">
                                    ${phase.docs.map(doc => {
                                        if (doc.type === 'form') {
                                            return `
                                                <li class="doc-item form-link" onclick="window.open('${doc.file}', '_blank')">
                                                    <span class="doc-num">${doc.num}</span>
                                                    <span class="doc-text">${doc.text}</span>
                                                </li>
                                            `;
                                        } else if (doc.type === 'upload') {
                                            return `
                                                <li class="doc-item upload-field">
                                                    <div style="display: flex; gap: 10px; width: 100%;">
                                                        <span class="doc-num">${doc.num}</span>
                                                        <span class="doc-text">${doc.text}</span>
                                                    </div>
                                                    <div class="file-input-wrapper">
                                                        <input type="file" id="${doc.id}" accept=".pdf,.jpg,.png,.jpeg">
                                                        <span class="file-uploaded" id="status-${doc.id}" style="display:none;"></span>
                                                    </div>
                                                </li>
                                            `;
                                        }
                                    }).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        <div class="phase-actions">
                            ${phase.status === 'active' || phase.status === 'completed' ? `
                                <button class="btn btn-primary" onclick="openPhase(${phase.id}, '${projectId}')">
                                    Otvori Fazu
                                </button>
                            ` : `
                                <button class="btn" disabled>Otvori Fazu</button>
                            `}
                            ${phase.status === 'active' && !phase.completed ? `
                                <button class="btn btn-success" onclick="completePhase(${phase.apiId}, ${phase.id}, '${projectId}')">
                                    Označi kao Gotovo
                                </button>
                            ` : ''}
                            ${phase.id === 0 ? `
                                <button class="btn btn-secondary" onclick="downloadPDF(${projectId}, 'forma-ovlascenja')">
                                    📥 Preuzmи Ovlašćenje
                                </button>
                                <button class="btn btn-secondary" onclick="downloadPDF(${projectId}, 'forma-ugovor')">
                                    📥 Preuzmи Ugovor
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Inicijalizuj upload listeners
        setTimeout(() => {
            initializeUploadListeners();
        }, 100);
    }

    // Inicijalizuj upload listeners
    function initializeUploadListeners() {
        const fileInputs = document.querySelectorAll('input[type="file"]');
        fileInputs.forEach(input => {
            input.addEventListener('change', function() {
                const statusId = 'status-' + this.id;
                const statusEl = document.getElementById(statusId);
                const docItem = this.closest('.doc-item');
                
                if (this.files.length > 0) {
                    statusEl.textContent = 'Uploadovan: ' + this.files[0].name;
                    statusEl.style.display = 'flex';
                    docItem.classList.add('uploaded');
                } else {
                    statusEl.style.display = 'none';
                    docItem.classList.remove('uploaded');
                }
            });
        });
    }

    // Otvori fazu
    function openPhase(phaseId, projectId) {
        alert(`Otvaraj faza ${phaseId} za projekat ${projectId}`);
        // Ovdje će biti logika za otvaranje forme za tu fazu
    }

    // Označi fazu kao gotovu - koristi API
    async function completePhase(faseId, fazaBroj, projectId) {
        try {
            const response = await fetch(`/api/faze/${faseId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    completed: true
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Greška pri ažuriranju faze');
            }

            console.log('Faza je označena kao gotova:', faseId);
            
            // Ponovno učitaj projekat (što će refresh-ati faze)
            loadProject();
        } catch (error) {
            console.error('Error completing phase:', error);
            alert('Greška: ' + error.message);
        }
    }

    // Mobile menu
    menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.add('hidden');
            }
        });
    });

    // Učitaj projekat
    loadProject();
    
    // Inicijalizuj sidebar
    initSidebar();
</script>

</body>
</html>
